name: Publish Dev Firmware

on:
  push:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-dev
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2025.10.0
    with:
      files: |
        voice-assistant.factory.yaml
        voice-assistant-display.factory.yaml
      esphome-version: 2026.2.4
      release-version: dev

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.10.0
    needs:
      - build-firmware
    with:
      version: dev

  deploy-pages:
    needs: upload-to-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download all releases and manifests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public/dev

          # Download dev release
          gh release download dev \
            --repo "${{ github.repository }}" \
            --pattern "*.json" \
            --pattern "*.bin" \
            --dir public/dev || true

      - name: Create index.html
        run: |
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          BASE_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}"

          cat > public/index.html << 'HEADER'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Voice Assistant Firmware</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; max-width: 900px; }
              h1 { color: #333; }
              h2 { color: #555; margin-top: 30px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
              h3 { color: #666; margin-top: 20px; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 8px 0; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              code { font-family: monospace; font-size: 0.85em; background: #f6f8fa; padding: 2px 6px; border-radius: 3px; }
              .latest { background: #28a745; color: white; padding: 2px 8px; border-radius: 3px; font-size: 0.8em; margin-left: 10px; }
              .manifest-section { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 30px; }
            </style>
          </head>
          <body>
            <h1>Voice Assistant Firmware</h1>
            <p>Pre-built Voice Assistant firmware binaries for ESPHome.</p>

            <div class="manifest-section">
              <h3>Manifests (JSON)</h3>
              <p>Machine-readable manifests with all versions, URLs, and SHA256 checksums:</p>
              <ul>
          HEADER

          for manifest in public/dev/*.json; do
            if [ -f "$manifest" ]; then
              filename=$(basename "$manifest")
              target="${filename%.manifest.json}"
              echo "        <li><a href=\"${filename}\">${target}</a> - <code>${BASE_URL}/dev/${filename}</code></li>" >> public/index.html
            fi
          done

          cat >> public/index.html << 'FOOTER'
              </ul>
            </div>

          </body>
          </html>
          FOOTER

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
