name: Publish Dev Firmware

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2025.10.0
    with:
      files: |
        voice-assistant.factory.yaml
        voice-assistant-display.factory.yaml
      esphome-version: 2026.2.4
      release-version: dev

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.10.0
    needs:
      - build-firmware
    with:
      version: dev
