esphome:
  includes:
    - <sstream>

globals:
  # Temporary variable to store previous screen
  - id: previous_screen
    type: std::string
    restore_value: no
  # Wrapped version of message
  - id: message_wrapped
    type: std::string
    restore_value: no
  # Status area text
  - id: status_area_text
    type: std::string
    restore_value: no

external_components:
  - source: github://kylehase/ESPHome-ST7305-RLCD
    components: [ st7305_rlcd ]
    refresh: 24h

# Display
spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

display:
  - platform: st7305_rlcd
    id: screen
    model: WAVESHARE_400X300
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    rotation: 0
    update_interval: 15min
    lambda: |-
      id(update_screen).execute();

# Various ways to configure fonts
